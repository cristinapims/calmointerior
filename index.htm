<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calmo — Client Intake</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDEDE9;
  --bg-dark: #E3E3DD;
  --text: #2C2C2C;
  --text-light: #6B6B65;
  --text-lighter: #9B9B93;
  --accent: #8B7355;
  --accent-light: #A89279;
  --border: #D4D4CE;
  --white: #FAFAF8;
  --error: #A85A4A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
.serif { font-family:'Cormorant Garamond',serif; }

/* Animations */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-up { animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards; }
.fade-in { animation: fadeIn 0.6s ease forwards; }

/* Layout */
.container { max-width:640px; margin:0 auto; padding:24px 20px; min-height:100vh; display:flex; flex-direction:column; }

/* Screen: Language */
.screen { display:none; }
.screen.active { display:flex; flex-direction:column; min-height:100vh; }

/* Intro */
.intro-screen { justify-content:center; align-items:center; text-align:center; padding:40px 24px; }
.intro-screen .logo { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:300; letter-spacing:0.15em; color:var(--text); margin-bottom:8px; }
.intro-screen .tagline { font-size:13px; color:var(--text-lighter); letter-spacing:0.1em; margin-bottom:48px; }
.lang-btn { display:block; width:100%; max-width:320px; margin:0 auto 12px; padding:16px; background:var(--white); border:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); cursor:pointer; letter-spacing:0.05em; transition:all 0.3s; }
.lang-btn:hover { border-color:var(--accent); background:var(--white); }

/* Progress */
.progress-bar { width:100%; height:2px; background:var(--border); margin:16px 0 32px; }
.progress-fill { height:100%; background:var(--accent); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }

/* Step header */
.step-label { font-size:11px; color:var(--text-lighter); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:4px; }
.step-count { font-size:11px; color:var(--text-lighter); margin-bottom:0; }

/* Questions */
.question-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:300; line-height:1.4; margin:24px 0 20px; color:var(--text); }
.question-subtitle { font-size:13px; color:var(--text-light); line-height:1.6; margin-bottom:24px; }

/* Inputs */
input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea, select {
  width:100%; padding:14px 16px; background:var(--white); border:1px solid var(--border);
  font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none;
  transition:border-color 0.3s; margin-bottom:12px; -webkit-appearance:none; border-radius:0;
}
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { min-height:100px; resize:vertical; line-height:1.6; }
select { cursor:pointer; }

/* Radio/Check options */
.option-group { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.option-btn { padding:14px 16px; background:var(--white); border:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); cursor:pointer; text-align:left; transition:all 0.25s; line-height:1.4; }
.option-btn:hover { border-color:var(--accent-light); }
.option-btn.selected { border-color:var(--accent); background:rgba(139,115,85,0.06); }

/* Image grid */
.image-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.img-card { position:relative; cursor:pointer; overflow:hidden; aspect-ratio:1; border:2px solid transparent; transition:all 0.3s; }
.img-card img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; }
.img-card:hover img { transform:scale(1.05); }
.img-card.selected { border-color:var(--accent); }
.img-card.selected::after { content:'✓'; position:absolute; top:8px; right:8px; width:24px; height:24px; background:var(--accent); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; }
.img-card.disabled { opacity:0.4; pointer-events:none; }
.img-hint { font-size:12px; color:var(--text-lighter); margin-bottom:16px; }

/* Navigation */
.nav-row { display:flex; gap:12px; margin-top:auto; padding:24px 0; }
.btn { flex:1; padding:14px; font-family:'DM Sans',sans-serif; font-size:13px; letter-spacing:0.08em; cursor:pointer; transition:all 0.3s; border:none; }
.btn-back { background:none; border:1px solid var(--border); color:var(--text-light); }
.btn-back:hover { border-color:var(--text-light); }
.btn-next { background:var(--accent); color:var(--white); }
.btn-next:hover { background:var(--accent-light); }
.btn-next:disabled { background:var(--border); color:var(--text-lighter); cursor:default; }

/* Estimate screen */
.estimate-card { background:var(--white); border:1px solid var(--border); padding:32px 24px; margin:24px 0; }
.estimate-label { font-size:11px; letter-spacing:0.15em; color:var(--text-lighter); text-transform:uppercase; margin-bottom:8px; }
.estimate-range { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; color:var(--text); margin-bottom:4px; }
.estimate-note { font-size:12px; color:var(--text-light); line-height:1.6; }
.estimate-breakdown { margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
.estimate-line { display:flex; justify-content:space-between; padding:8px 0; font-size:13px; color:var(--text-light); }
.estimate-line span:last-child { color:var(--text); font-weight:500; }

/* Payment */
.payment-section { margin-top:24px; }
.payment-btn { display:block; width:100%; padding:16px; margin-bottom:10px; background:var(--white); border:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); cursor:pointer; text-align:center; transition:all 0.3s; text-decoration:none; }
.payment-btn:hover { border-color:var(--accent); }
.payment-cta { background:var(--accent); color:var(--white); border:none; font-size:14px; letter-spacing:0.05em; margin-bottom:20px; }
.payment-cta:hover { background:var(--accent-light); }

/* Summary */
.summary-section { margin-bottom:24px; }
.summary-label { font-size:11px; letter-spacing:0.12em; color:var(--text-lighter); text-transform:uppercase; margin-bottom:6px; }
.summary-value { font-size:14px; color:var(--text); line-height:1.6; }
.selected-images { display:flex; gap:8px; margin-top:8px; }
.selected-images img { width:80px; height:80px; object-fit:cover; }

.divider { width:100%; height:1px; background:var(--border); margin:24px 0; }

/* Responsive */
@media (max-width:400px) {
  .image-grid { grid-template-columns:repeat(3,1fr); gap:6px; }
  .question-title { font-size:21px; }
  .estimate-range { font-size:28px; }
}
</style>
</head>

function calcEstimate() {
  let minMXN = 18000, maxMXN = 25000;
  const sqm = parseInt(data.sqm) || 0;
  
  // Adjust by type
  if (data.type.includes('Comercial') || data.type.includes('Commercial')) {
    minMXN = 45000; maxMXN = 80000;
  }
  
  // Adjust by spaces count
  const spaceCount = data.spaces.length;
  if (data.spaces.some(s => s.includes('Todo') || s.includes('Entire'))) {
    minMXN = 35000; maxMXN = 65000;
    if (data.type.includes('Comercial') || data.type.includes('Commercial')) {
      minMXN = 55000; maxMXN = 95000;
    }
  } else if (spaceCount > 3) {
    minMXN = 30000; maxMXN = 55000;
  } else if (spaceCount >= 2) {
    minMXN = 22000; maxMXN = 40000;
  }
  
  // Adjust by scope
  if (data.scope.includes('ejecución') || data.scope.includes('execution')) {
    minMXN = Math.round(minMXN * 1.3);
    maxMXN = Math.round(maxMXN * 1.4);
  } else if (data.scope.includes('consultoría') || data.scope.includes('Consultation')) {
    minMXN = 4500; maxMXN = 4500;
  }
  
  // Adjust by sqm
  if (sqm > 200) { minMXN = Math.round(minMXN * 1.3); maxMXN = Math.round(maxMXN * 1.4); }
  else if (sqm > 100) { minMXN = Math.round(minMXN * 1.15); maxMXN = Math.round(maxMXN * 1.2); }
  
  // Add executive plans
  if (data.scope.includes('ejecución') || data.scope.includes('execution')) {
    minMXN += 15000;
    maxMXN += 20000;
  }
  
  const isMXN = !isUSLocation();
  if (isMXN) {
    return { range: '$' + minMXN.toLocaleString() + ' — $' + maxMXN.toLocaleString() + ' MXN', isMXN: true };
  } else {
    const minUSD = Math.round(minMXN / 17);
    const maxUSD = Math.round(maxMXN / 17);
    return { range: '$' + minUSD.toLocaleString() + ' — $' + maxUSD.toLocaleString() + ' USD', isMXN: false };
  }
}

function isUSLocation() {
  if (lang === 'en') return true;
  const loc = data.location.toLowerCase();
  return loc.includes('us') || loc.includes('united') || loc.includes('florida') || loc.includes('california') || loc.includes('texas') || loc.includes('new york') || loc.includes('miami') || loc.includes('cabo');
}

function validateStep() {
  if (step === 1) return data.name && data.email && data.phone && data.location;
  if (step === 2) return data.type && data.scope && data.spaces.length > 0;
  if (step === 3) return data.sqm && data.condition && data.timeline;
  if (step === 4) return data.selectedImages.length === 3 && data.styleWhy.trim().length > 0;
  return true;
}

function updateNav() {
  const btn = document.querySelector('.btn-next');
  if (btn) btn.disabled = !validateStep();
}

function goBack() {
  if (step > 1) { step--; render(); }
  else { step = 0; render(); }
}

function goNext() {
  if (!validateStep()) return;
  step++;
  render();
  window.scrollTo(0, 0);
}

function toggleSpace(s) {
  const idx = data.spaces.indexOf(s);
  if (idx >= 0) data.spaces.splice(idx, 1);
  else data.spaces.push(s);
  render();
}

function toggleImage(i) {
  const idx = data.selectedImages.indexOf(i);
  if (idx >= 0) data.selectedImages.splice(idx, 1);
  else if (data.selectedImages.length < 3) data.selectedImages.push(i);
  render();
}

function showTransfer(type) {
  const elMx = document.getElementById('transfer-info-mx');
  const elUs = document.getElementById('transfer-info-us');
  if (type === 'mx') {
    elMx.style.display = elMx.style.display === 'none' ? 'block' : 'none';
    elUs.style.display = 'none';
  } else {
    elUs.style.display = elUs.style.display === 'none' ? 'block' : 'none';
    elMx.style.display = 'none';
  }
  sendEmail();
}
